<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Minimal naval mine icon</title>
  <desc id="desc">A simplified flat top-down grey naval mine icon with a smaller round body and long symmetric contact rods.</desc>

  <rect width="512" height="512" rx="96" fill="transparent"/>

  <g transform="translate(256 256) scale(1.22)">
    <g stroke="#5F6670" stroke-width="18" stroke-linecap="round">
      <line x1="0" y1="-112" x2="0" y2="-190"/>
      <line x1="0" y1="-112" x2="0" y2="-176" transform="rotate(45)"/>
      <line x1="0" y1="-112" x2="0" y2="-190" transform="rotate(90)"/>
      <line x1="0" y1="-112" x2="0" y2="-176" transform="rotate(135)"/>
      <line x1="0" y1="-112" x2="0" y2="-190" transform="rotate(180)"/>
      <line x1="0" y1="-112" x2="0" y2="-176" transform="rotate(225)"/>
      <line x1="0" y1="-112" x2="0" y2="-190" transform="rotate(270)"/>
      <line x1="0" y1="-112" x2="0" y2="-176" transform="rotate(315)"/>
    </g>


    <circle r="120" fill="#87909A" stroke="#5F6670" stroke-width="12"/>
    <circle r="88" fill="#A7ADB5"/>
    <circle r="52" fill="#737B86"/>
    <circle r="22" fill="#555C66"/>

    <g fill="#68707A">
      <circle cx="0" cy="-92" r="8"/>
      <circle cx="65.05" cy="-65.05" r="8"/>
      <circle cx="92" cy="0" r="8"/>
      <circle cx="65.05" cy="65.05" r="8"/>
      <circle cx="0" cy="92" r="8"/>
      <circle cx="-65.05" cy="65.05" r="8"/>
      <circle cx="-92" cy="0" r="8"/>
      <circle cx="-65.05" cy="-65.05" r="8"/>
    </g>
  </g>
</svg>
