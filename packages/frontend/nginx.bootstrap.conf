# Минимальный конфиг для первого запуска до выпуска сертификата.
# Используется, когда /etc/letsencrypt/live/${DOMAIN}/fullchain.pem ещё не существует:
# отдаёт ACME http-01 challenge на 80-м порту, на всё остальное — 503.
# После выпуска сертификата docker-entrypoint.sh подключает основной nginx.conf
# (из шаблона) и перезапускает nginx.

server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 503 "Waiting for Let's Encrypt certificate issuance...\n";
        add_header Content-Type text/plain;
    }
}
