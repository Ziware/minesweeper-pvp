server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Используем Docker DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # REST API сервис (профили, авторизация).
        # set должен быть ДО rewrite break, иначе переменная не инициализируется.
        set $api_upstream http://api:3002;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        # Загруженные аватары (отдаёт API через @fastify/static).
        set $api_upstream http://api:3002;
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_cache_valid  200 1d;
        add_header         Cache-Control "public, max-age=86400";
    }

    location /socket.io/ {
        # Переменная нужна чтобы nginx не падал если backend ещё не поднят
        set $backend_upstream http://backend:3001;
        proxy_pass         $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
