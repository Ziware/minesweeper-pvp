services:
  log-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minesweeper-log-viewer
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - NODE_ENV=production
      - PORT=5174
    volumes:
      - ./logs:/app/logs
      # Persistent SSH keys storage
      - ./ssh-keys:/root/.ssh
    networks:
      - minesweeper-net
