services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: minesweeper-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - minesweeper-net

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: minesweeper-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - minesweeper-net

networks:
  minesweeper-net:
    driver: bridge
