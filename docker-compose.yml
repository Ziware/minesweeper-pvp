services:
  postgres:
    image: postgres:16-alpine
    container_name: minesweeper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       minesweeper
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - minesweeper-net

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: minesweeper-api
    restart: unless-stopped
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/minesweeper
      - JWT_SECRET=${JWT_SECRET}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-Minesweeper PvP <noreply@example.com>}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://${DOMAIN}}
      - UPLOADS_DIR=/app/uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - postgres
    networks:
      - minesweeper-net

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: minesweeper-backend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - GAME_LOG_DIR=/app/logs
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - INTERNAL_API_URL=http://api:3002
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./logs:/app/logs
    networks:
      - minesweeper-net

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    container_name: minesweeper-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # DOMAIN читается из .env-файла рядом с docker-compose.yml.
      - DOMAIN=${DOMAIN}
      - IS_DEBUG=${IS_DEBUG:-false}
    volumes:
      # Сертификаты Let's Encrypt (общая папка с certbot).
      - ./letsencrypt/etc:/etc/letsencrypt
      - ./letsencrypt/var:/var/lib/letsencrypt
      # Webroot для ACME http-01 challenge.
      - ./letsencrypt/www:/var/www/certbot
    depends_on:
      - backend
      - api
    networks:
      - minesweeper-net

  certbot:
    image: certbot/certbot:latest
    container_name: minesweeper-certbot
    restart: unless-stopped
    volumes:
      - ./letsencrypt/etc:/etc/letsencrypt
      - ./letsencrypt/var:/var/lib/letsencrypt
      - ./letsencrypt/www:/var/www/certbot
    # Каждые 12 часов пытается обновить сертификат.
    # Первоначальный выпуск делается отдельным скриптом init-letsencrypt.sh.
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
                    sleep 12h & wait $${!};
                  done"
    networks:
      - minesweeper-net

networks:
  minesweeper-net:
    driver: bridge

volumes:
  postgres-data:
  uploads-data:
